name: Build Container Image
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      HARBOR_USERNAME:
        required: true
      HARBOR_PASSWORD:
        required: true

env:
  TZ: "Europe/Berlin"
  HUSKY: 0

jobs:
  build-platform:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history + tags so the plugin-api version-stamping
          # prebuild step can resolve `git describe --tags
          # --match='plugin-api-v*'` inside the Docker build context
          # (the build stage copies `.git` via `COPY . .`).
          fetch-depth: 0

      - name: Download package.json
        uses: actions/download-artifact@v5
        continue-on-error: true # artifact only exists when running on main
        with:
          name: package-json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ inputs.version }}
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-platform
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via GitHub OIDC
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.cytario.org
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Determine tags
        id: tags
        run: |
          GHCR=ghcr.io/${{ github.repository }}
          HARBOR=harbor.cytario.org/oss/cytario-web
          # For pre-release versions (pr-*), only tag with version
          # For release versions, tag with both latest and version
          if [[ "${{ inputs.version }}" == pr-* ]]; then
            echo "ghcr_tags=${GHCR}:${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "harbor_tags=${HARBOR}:${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "ghcr_tags=${GHCR}:latest,${GHCR}:${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "harbor_tags=${HARBOR}:latest,${HARBOR}:${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(echo "${{ steps.tags.outputs.ghcr_tags }}" | tr ',' '\n' | xargs -I {} echo "-t {}") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      # Mirror the assembled multi-arch image from GHCR to Harbor. A
      # cross-registry imagetools copy is reliable, unlike pushing by
      # digest to two registries in one build.
      - name: Mirror image to Harbor
        run: |
          docker buildx imagetools create \
            $(echo "${{ steps.tags.outputs.harbor_tags }}" | tr ',' '\n' | xargs -I {} echo "-t {}") \
            ghcr.io/${{ github.repository }}:${{ inputs.version }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ inputs.version }}
          docker buildx imagetools inspect harbor.cytario.org/oss/cytario-web:${{ inputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing with the GitHub OIDC identity. The multi-arch index
      # digest is content-addressed, so the same digest signs both registries.
      - name: Sign images
        env:
          COSIGN_YES: "true"
        run: |
          digest=$(docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}:${{ inputs.version }} \
            --format '{{.Manifest.Digest}}')
          cosign sign ghcr.io/${{ github.repository }}@${digest}
          cosign sign harbor.cytario.org/oss/cytario-web@${digest}

      - name: Generate Summary
        if: always()
        run: |
          echo "## Container Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registries**: ghcr.io, harbor.cytario.org" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tags**:" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.version }}" == pr-* ]]; then
            echo "  - \`ghcr.io/${{ github.repository }}:${{ inputs.version }}\` (pre-release)" >> $GITHUB_STEP_SUMMARY
            echo "  - \`harbor.cytario.org/oss/cytario-web:${{ inputs.version }}\` (pre-release)" >> $GITHUB_STEP_SUMMARY
          else
            echo "  - \`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "  - \`ghcr.io/${{ github.repository }}:${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "  - \`harbor.cytario.org/oss/cytario-web:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "  - \`harbor.cytario.org/oss/cytario-web:${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          fi
