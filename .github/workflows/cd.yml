name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  qa-checks:
    name: QA Checks
    uses: ./.github/workflows/qa-checks.yml

  release:
    name: Release
    uses: ./.github/workflows/release.yml
    needs: qa-checks

  build:
    name: Build
    uses: ./.github/workflows/container.yml
    needs: release
    if: ${{ needs.release.outputs.version != '' }}
    with:
      version: ${{ needs.release.outputs.version }}

  deploy-dev:
    name: Dispatch dev deploy
    needs: [release, build]
    if: ${{ needs.release.outputs.version != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CYTARIO_DEPLOY_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CYTARIO_DEPLOY_DISPATCH_APP_PRIVATE_KEY }}
          repositories: cytario-infrastructure

      - name: Dispatch to cytario-infrastructure
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          jq -n --arg tag "$VERSION" '{
            event_type: "deploy-cytario-web",
            client_payload: { environment: "dev", image_tag: $tag }
          }' | gh api repos/cytario/cytario-infrastructure/dispatches \
            --method POST --input -
