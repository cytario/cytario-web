name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  qa-checks:
    name: QA Checks
    uses: ./.github/workflows/qa-checks.yml

  release:
    name: Release
    uses: ./.github/workflows/release.yml
    needs: qa-checks

  build:
    name: Build
    uses: ./.github/workflows/container.yml
    needs: release
    if: ${{ needs.release.outputs.version != '' }}
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via GitHub OIDC
    with:
      version: ${{ needs.release.outputs.version }}
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

  dispatch-ee:
    name: Dispatch cytario-ee rebuild
    needs: release
    if: ${{ needs.release.outputs.version != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CYTARIO_DEPLOY_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CYTARIO_DEPLOY_DISPATCH_APP_PRIVATE_KEY }}
          repositories: cytario-ee

      - name: Dispatch to cytario-ee
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          jq -n --arg version "$VERSION" '{
            event_type: "cytario-web-published",
            client_payload: { version: $version }
          }' | gh api repos/cytario/cytario-ee/dispatches \
            --method POST --input -
