name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  qa-checks:
    name: QA Checks
    uses: ./.github/workflows/qa-checks.yml

  release:
    name: Release
    uses: ./.github/workflows/release.yml
    needs: qa-checks

  build:
    name: Build
    uses: ./.github/workflows/container.yml
    needs: release
    if: ${{ needs.release.outputs.version != '' }}
    with:
      version: ${{ needs.release.outputs.version }}

  deploy-dev:
    name: Dispatch dev deploy
    needs: [release, build]
    if: ${{ needs.release.outputs.version != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CYTARIO_DEPLOY_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CYTARIO_DEPLOY_DISPATCH_APP_PRIVATE_KEY }}
          repositories: cytario-infrastructure

      - name: Dispatch to cytario-infrastructure
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: cytario/cytario-infrastructure
          event-type: deploy-cytario-web
          client-payload: '{"environment": "dev", "image_tag": "${{ needs.release.outputs.version }}"}'
