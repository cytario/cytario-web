name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-checks:
    name: QA Checks
    uses: ./.github/workflows/qa-checks.yml

  smoke-install:
    name: Downstream Install Smoke
    uses: ./.github/workflows/smoke-install.yml

  e2e:
    name: E2E Tests (cytario-docs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CYTARIO_DOCS_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CYTARIO_DOCS_DISPATCH_APP_PRIVATE_KEY }}
          repositories: cytario-docs

      - name: Dispatch E2E and wait
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REF: ${{ github.head_ref }}
          WEB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Dispatch the docs e2e workflow against the paired cytario-docs
          # branch directly when one exists, falling back to main. This
          # makes `--ref` carry the correct branch on first try; the docs
          # workflow uses `actions/checkout` with no explicit `ref:` so it
          # checks out whatever `--ref` was set to.
          DOCS_REF="$HEAD_REF"
          if ! gh workflow run e2e.yml \
              --repo cytario/cytario-docs \
              --ref "$DOCS_REF" \
              -f ref="$WEB_SHA" 2>/dev/null; then
            echo "::notice::No paired cytario-docs/$HEAD_REF branch; dispatching against main"
            DOCS_REF="main"
            gh workflow run e2e.yml \
              --repo cytario/cytario-docs \
              --ref "$DOCS_REF" \
              -f ref="$WEB_SHA"
          else
            echo "::notice::Using paired cytario-docs branch: $HEAD_REF"
          fi

          sleep 5
          RUN_ID=$(gh run list \
            --repo cytario/cytario-docs \
            --workflow e2e.yml \
            --limit 1 \
            --json databaseId --jq '.[0].databaseId')
          echo "::notice::E2E run: https://github.com/cytario/cytario-docs/actions/runs/$RUN_ID"

          gh run watch "$RUN_ID" --repo cytario/cytario-docs --compact -i 10 --exit-status

  build:
    name: Build
    uses: ./.github/workflows/container.yml
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via GitHub OIDC
    with:
      version: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
