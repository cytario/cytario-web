name: E2E Tests

on:
  workflow_call:

env:
  TZ: "Europe/Berlin"
  HUSKY: 0
  DATABASE_URL: "postgresql://cytario:cytario@localhost:5433/cytario"
  REDIS_HOST: localhost
  REDIS_PORT: 6379

jobs:
  e2e:
    name: "Playwright E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cytario
          POSTGRES_USER: cytario
          POSTGRES_PASSWORD: cytario
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:9
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push

      - name: Seed database
        run: npx prisma db seed

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          CLIENT_ID: ${{ secrets.E2E_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.E2E_CLIENT_SECRET }}
          SCOPES: "openid profile"
          WEB_HOST: "http://localhost:5173"
          COOKIE_SECRET: "e2e-cookie-secret"
          JWT_SECRET: "e2e-jwt-secret"

      - name: Start application
        run: npm start &
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          CLIENT_ID: ${{ secrets.E2E_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.E2E_CLIENT_SECRET }}
          SCOPES: "openid profile"
          WEB_HOST: "http://localhost:5173"
          COOKIE_SECRET: "e2e-cookie-secret"
          JWT_SECRET: "e2e-jwt-secret"

      - name: Wait for application
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_CONNECTION_NAME: ${{ secrets.E2E_CONNECTION_NAME }}
          E2E_IMAGE_PATH: ${{ secrets.E2E_IMAGE_PATH }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
